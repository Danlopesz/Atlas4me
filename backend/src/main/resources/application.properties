# Server Configuration
server.port=${PORT:5202}
spring.application.name=atlas4me-backend

# --- BANCO DE DADOS (MySQL) ---
# Usando as variáveis padrão do Railway
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

# Se o MYSQLUSER não existir, ele tentará 'root' (que é o padrão do Railway)
spring.datasource.username=${MYSQLUSER:root}

# Se o MYSQLPASSWORD não existir, usa a senha que você postou (mas o ideal é vir da variável)
spring.datasource.password=${MYSQLPASSWORD}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- OUTRAS CONFIGURACOES (MANTIDAS) ---

# JWT Configuration
jwt.secret=YXRsYXM0bWUtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLW1pbmltdW0tMjU2LWJpdHM=
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://www.atlas4me.com,https://atlas4me.com

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.atlas4me=DEBUG
logging.level.org.springframework.security=DEBUG