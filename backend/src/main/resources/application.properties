# Server Configuration
server.port=${PORT:5202}
spring.application.name=atlas4me-backend

# --- BANCO DE DADOS (MySQL) ---
# Logica: Usa a variavel do Railway (MYSQLHOST) se existir. Senao, usa 'localhost'.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:atlas4me}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

# Logica: Usa o usuario do Railway (MYSQLUSER). Senao, usa 'atlas_user' (compativel com docker-compose).
spring.datasource.username=${MYSQLUSER:atlas_user}

# Logica: Usa a senha do Railway (MYSQLPASSWORD). Senao, usa 'atlas_password' (compativel com docker-compose).
spring.datasource.password=${MYSQLPASSWORD:atlas_password}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Como e um projeto novo, pode deixar baseline-version=0 ou 1, 
# mas se o banco estiver vazio, ele nem precisa disso.

# --- REMOVIDO: INICIALIZACAO DO SQL (schema.sql e data.sql) ---
# Delete as linhas spring.sql.init.*

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Pode remover o defer-datasource-initialization pois o Flyway roda antes do JPA por padrao

# --- OUTRAS CONFIGURACOES (MANTIDAS) ---

# JWT Configuration
jwt.secret=YXRsYXM0bWUtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLW1pbmltdW0tMjU2LWJpdHM=
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://www.atlas4me.com,https://atlas4me.com

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.atlas4me=DEBUG
logging.level.org.springframework.security=DEBUG