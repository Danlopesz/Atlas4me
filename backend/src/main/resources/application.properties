# Server Configuration
server.port=${PORT:5202}
spring.application.name=atlas4me-backend

# --- BANCO DE DADOS (MySQL) ---
# Lógica: Usa a variável do Railway (MYSQLHOST) se existir. Senão, usa 'localhost'.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:atlas4me}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

# Lógica: Usa o usuário do Railway (MYSQLUSER). Senão, usa 'root'.
spring.datasource.username=${MYSQLUSER:root}

# Lógica: Usa a senha do Railway (MYSQLPASSWORD). Senão, usa 'atlas'.
spring.datasource.password=${MYSQLPASSWORD:atlas}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Como é um projeto novo, pode deixar baseline-version=0 ou 1, 
# mas se o banco estiver vazio, ele nem precisa disso.

# --- REMOVIDO: INICIALIZAÇÃO DO SQL (schema.sql e data.sql) ---
# Delete as linhas spring.sql.init.*

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Pode remover o defer-datasource-initialization pois o Flyway roda antes do JPA por padrão

# --- OUTRAS CONFIGURAÇÕES (MANTIDAS) ---

# JWT Configuration
jwt.secret=YXRsYXM0bWUtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLW1pbmltdW0tMjU2LWJpdHM=
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.atlas4me=DEBUG
logging.level.org.springframework.security=DEBUG