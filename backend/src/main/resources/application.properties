# Server Configuration

server.port=${PORT:8080}
spring.application.name=atlas4me-backend

# --- BANCO DE DADOS (MySQL) ---

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:atlas4me}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${MYSQLUSER:atlas_user}
spring.datasource.password=${MYSQLPASSWORD:atlas_password}

# --- FLYWAY ---

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- JWT Configuration ---

jwt.secret=${JWT_SECRET:YXRsYXM0bWUtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLW1pbmltdW0tMjU2LWJpdHM=}
jwt.expiration=86400000

# --- CORS Configuration ---

cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://www.atlas4me.com,https://atlas4me.com}
# --- Swagger/OpenAPI Configuration ---

springdoc.api-docs.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Logging ---

logging.level.atlas4me=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL:WARN}
