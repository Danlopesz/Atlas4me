# Server Configuration
server.port=5202
spring.application.name=atlas4me-backend

# --- BANCO DE DADOS (MySQL) ---
spring.datasource.url=jdbc:mysql://localhost:3307/atlas4me?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=atlas

# --- INICIALIZAÇÃO DO SQL (NOVO) ---
# Isso força o Spring a ler seus arquivos schema.sql e data.sql
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
# Se der erro ao dropar tabela que não existe, ele continua
spring.sql.init.continue-on-error=true 

# --- JPA / HIBERNATE ---
# Mudamos de 'validate' para 'none'. 
# Motivo: Nós já criamos as tabelas manualmente no schema.sql. 
# Não queremos que o Hibernate mexa nisso.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Garante que os scripts rodem PRIMEIRO, depois o Hibernate conecta
spring.jpa.defer-datasource-initialization=false

# --- OUTRAS CONFIGURAÇÕES (MANTIDAS) ---

# JWT Configuration
jwt.secret=YXRsYXM0bWUtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLW1pbmltdW0tMjU2LWJpdHM=
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging
logging.level.atlas4me=DEBUG
logging.level.org.springframework.security=DEBUG