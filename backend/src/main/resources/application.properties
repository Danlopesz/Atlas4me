# Server Configuration
server.port=${PORT:5202}
spring.application.name=atlas4me-backend

# --- BANCO DE DADOS (MySQL) ---
# Configuracao para o Railway usando as variaveis exatas que voce forneceu.
# Adicionamos 'jdbc:' antes porque o Spring precisa, mas o Railway fornece apenas o host.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3307}/${MYSQLDATABASE:atlas4me}?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false

# No Railway, MYSQLUSER e 'root'. Localmente, o padrao e 'atlas_user'.
spring.datasource.username=${MYSQLUSER:atlas_user}

# No Railway, MYSQLPASSWORD e a senha longa. Localmente, o padrao e 'atlas_password'.
spring.datasource.password=${MYSQLPASSWORD:atlas_password}

# --- FLYWAY ---
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
# Como e um projeto novo, pode deixar baseline-version=0 ou 1, 
# mas se o banco estiver vazio, ele nem precisa disso.

# --- REMOVIDO: INICIALIZACAO DO SQL (schema.sql e data.sql) ---
# Delete as linhas spring.sql.init.*

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Pode remover o defer-datasource-initialization pois o Flyway roda antes do JPA por padrao

# --- OUTRAS CONFIGURACOES (MANTIDAS) ---

# JWT Configuration
# IMPORTANTE: Defina JWT_SECRET como variável de ambiente no Railway!
jwt.secret=${JWT_SECRET:YXRsYXM0bWUtc3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLW1pbmltdW0tMjU2LWJpdHM=}
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,https://www.atlas4me.com,https://atlas4me.com}

# Swagger/OpenAPI Configuration
# Desabilitado em produção por segurança
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Logging (INFO em produção, DEBUG apenas em dev)
logging.level.atlas4me=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=${LOG_LEVEL:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL:WARN}